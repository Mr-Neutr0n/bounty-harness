source: "https://mas.owasp.org/MASVS/"
version: "2.0.0"
categories:
  - id: "MASVS-STORAGE"
    name: "Data Storage and Privacy"
    requirements:
      - id: "MASVS-STORAGE-1"
        name: "Implement a mobile data storage privacy policy"
      - id: "MASVS-STORAGE-2"
        name: "No sensitive data in backups generated by the OS"
      - id: "MASVS-STORAGE-3"
        name: "No sensitive data in logs"
      - id: "MASVS-STORAGE-4"
        name: "Sensitive data excluded from keyboard cache"
  - id: "MASVS-CRYPTO"
    name: "Cryptography"
    requirements:
      - id: "MASVS-CRYPTO-1"
        name: "Use proven cryptographic implementations and primitives"
      - id: "MASVS-CRYPTO-2"
        name: "Use secure random number generators"
      - id: "MASVS-CRYPTO-3"
        name: "Manage cryptographic keys securely"
  - id: "MASVS-AUTH"
    name: "Authentication and Session Management"
    requirements:
      - id: "MASVS-AUTH-1"
        name: "Stateful session management for remote service"
      - id: "MASVS-AUTH-2"
        name: "Stateless token-based session management"
      - id: "MASVS-AUTH-3"
        name: "Local authentication using platform APIs"
  - id: "MASVS-NETWORK"
    name: "Network Communication"
    requirements:
      - id: "MASVS-NETWORK-1"
        name: "Encrypt all data in transit using TLS"
      - id: "MASVS-NETWORK-2"
        name: "Implement certificate pinning"
      - id: "MASVS-NETWORK-3"
        name: "Secure data transfer channel endpoints"
  - id: "MASVS-PLATFORM"
    name: "Platform Interaction"
    requirements:
      - id: "MASVS-PLATFORM-1"
        name: "Requests permissions securely using principle of least privilege"
      - id: "MASVS-PLATFORM-2"
        name: "Validate data from external sources"
      - id: "MASVS-PLATFORM-3"
        name: "No sensitive data exported via platform APIs"
      - id: "MASVS-PLATFORM-4"
        name: "WebViews configured securely"
      - id: "MASVS-PLATFORM-5"
        name: "Deep links are validated"
  - id: "MASVS-CODE"
    name: "Code Quality and Build Settings"
    requirements:
      - id: "MASVS-CODE-1"
        name: "Validated inputs across all components"
      - id: "MASVS-CODE-2"
        name: "Security-relevant compiler and build flags enabled"
      - id: "MASVS-CODE-3"
        name: "No code injection in third-party libraries"
      - id: "MASVS-CODE-4"
        name: "Free of debugging code and dev backdoors"
  - id: "MASVS-RESILIENCE"
    name: "Resilience Against Reverse Engineering"
    requirements:
      - id: "MASVS-RESILIENCE-1"
        name: "Emulator detection"
      - id: "MASVS-RESILIENCE-2"
        name: "Root/jailbreak detection"
      - id: "MASVS-RESILIENCE-3"
        name: "Integrity checking"
      - id: "MASVS-RESILIENCE-4"
        name: "Obfuscation"
      - id: "MASVS-RESILIENCE-5"
        name: "Anti-tampering mechanisms"
  - id: "MASVS-PRIVACY"
    name: "Privacy"
    requirements:
      - id: "MASVS-PRIVACY-1"
        name: "Minimize data collection to declared purposes"
      - id: "MASVS-PRIVACY-2"
        name: "User consent before tracking or data sharing"
      - id: "MASVS-PRIVACY-3"
        name: "Data retention and deletion controls"