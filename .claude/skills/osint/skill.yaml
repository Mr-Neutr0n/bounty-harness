name: osint
version: 2.0.0
description: Open Source Intelligence — GitHub dorking, Google dorks, Shodan/Censys, email discovery, WHOIS history, certificate transparency, leaked credentials
bounded_context: IntelligenceContext
owasp_wstg:
  - WSTG-INFO-01
  - WSTG-INFO-02
  - WSTG-INFO-10
owasp_api_top10: []
severity_range: [info, low, medium]
tools_required:
  - curl
  - trufflehog
  - gitleaks
  - semgrep
  - python3
  - jq
  - git
  - openssl
  - dnsx
input_files:
  - all_unique.txt
workflows:
  github-secrets:
    description: Search a GitHub organization or user for exposed secrets.
    inputs: [TARGET_ORG, OUTDIR, CONTEXT]
    command: |
      mkdir -p $OUTDIR/osint/github && \
      python3 .claude/skills/osint/scripts/github_secret_scanner.py --context .bb/context.json --target-org "${TARGET_ORG:?Set TARGET_ORG}" --gh-token "${GITHUB_TOKEN:-}" --output $OUTDIR/osint/github/findings.jsonl
    outputs:
      - $OUTDIR/osint/github/findings.jsonl
    evidence_dir: $OUTDIR/osint/github/evidence/
    detection_signals:
      - "public repositories or code search expose credentials or internal URLs"
      - "deep scan identifies secrets in cloned repository content"
    false_positives:
      - "secret-like value is a fixture, hash, or revoked token"
      - "repository is unrelated to the assessed organization"
    next:
      if_findings: google-dorks
      if_no_findings: google-dorks

  google-dorks:
    description: Generate and run Google dork queries for a target domain or keyword.
    inputs: [TARGET, OUTDIR, CONTEXT]
    command: |
      mkdir -p $OUTDIR/osint/google && \
      python3 .claude/skills/osint/scripts/google_dork_runner.py --context .bb/context.json --target $TARGET --dork-file "${DORK_FILE:-}" --output $OUTDIR/osint/google/findings.jsonl
    outputs:
      - $OUTDIR/osint/google/findings.jsonl
    evidence_dir: $OUTDIR/osint/google/evidence/
    detection_signals:
      - "search results expose sensitive files, directory listings, or internal documents"
      - "dork output links to target-owned sensitive material"
    false_positives:
      - "result is intentionally public content"
      - "search result is stale or belongs to another organization"
    next:
      if_findings: null
      if_no_findings: null

evidence_templates:
  github_secret: "GitHub commit URL + line number with exposed secret"
  google_dork: "Google dork URL + screenshot of exposed file"
  email_breach: "HIBP/Holehe output showing password exposed in breach"
