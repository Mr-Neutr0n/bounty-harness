id: invite_replay
name: Invite Workflow Abuse
category: business-logic
severity: high
description: Test invite workflows for step skipping, replay, accept-after-revoke, and cross-workspace invite abuse.
preconditions:
  auth_required: mandatory
  tools: [curl, python3, jq]
  inputs: [persona/headers/, traffic-corpus/routes.jsonl]
  personas_required: 2
workflow: business-logic/test-skip-step
detection_signals:
  positive:
    - "Invite accepted after revocation"
    - "Invite accepted by different user than intended"
    - "Invite token reused"
  negative:
    - "Revoked invite returns error"
    - "Invite is single-use bound to email/session"
evidence_required:
  - "Workflow state trace"
  - "Request showing invite accepted under invalid conditions"
false_positives:
  - "Invite is open/invite-anyone type"
standards:
  owasp_wstg: [WSTG-BUSL-01]
references:
  - "https://owasp.org/www-project-web-security-testing-guide/stable/4-Web_Application_Security_Testing/10-Business_Logic_Testing/"
safety:
  risk_tier: intrusive
  data_modifying: true