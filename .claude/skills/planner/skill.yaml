name: planner
version: 1.0.0
description: "Domain-driven ranked test plan generator — consumes domain model, technique catalog, coverage ledger, and outputs a prioritized list of workflows with rationales, safety flags, and evidence requirements"
bounded_context: PlanningContext
owasp_wstg: []
owasp_api_top10: []
severity_range: [info]
tools_required:
  - python3
  - jq
  - yq
input_files: []
workflows:
  generate-plan:
    description: "Load domain profile + technique catalog + coverage data and produce a ranked test plan"
    inputs: [OUTDIR]
    command: |
      mkdir -p $OUTDIR/planner && \
      python3 .claude/skills/planner/scripts/generate_plan.py \
        --domain-profile ${DOMAIN_PROFILE:-$OUTDIR/domain-model/domain-profile.json} \
        --techniques-dir ${TECHNIQUES_DIR:-.claude/skills/technique-kb/techniques} \
        --coverage-matrix ${COVERAGE_MATRIX:-.claude/skills/coverage/coverage_matrix.yaml} \
        --output ${PLAN_OUTPUT:-$OUTDIR/planner/plan.json}
    outputs:
      - $OUTDIR/planner/plan.json
    evidence_dir: null
    detection_signals:
      - "plan JSON contains ranked plan_items with scores and rationales"
      - "summary shows coverage delta and priority distribution"
    false_positives:
      - "technique catalog is empty, plan_items will be empty"
      - "coverage matrix is missing, all techniques treated as gaps"
    next:
      if_findings: visualize-plan
      if_no_findings: visualize-plan

  generate-plan-safe:
    description: "Generate plan excluding intrusive and destructive techniques"
    inputs: [OUTDIR]
    command: |
      mkdir -p $OUTDIR/planner && \
      python3 .claude/skills/planner/scripts/generate_plan.py \
        --domain-profile ${DOMAIN_PROFILE:-$OUTDIR/domain-model/domain-profile.json} \
        --techniques-dir ${TECHNIQUES_DIR:-.claude/skills/technique-kb/techniques} \
        --coverage-matrix ${COVERAGE_MATRIX:-.claude/skills/coverage/coverage_matrix.yaml} \
        --exclude-intrusive \
        --exclude-destructive \
        --output ${PLAN_OUTPUT:-$OUTDIR/planner/plan.json}
    outputs:
      - $OUTDIR/planner/plan.json
    evidence_dir: null
    detection_signals:
      - "plan JSON contains only safe, non-destructive plan_items"
    false_positives:
      - "may exclude important techniques that require auth but are otherwise safe"
    next:
      if_findings: visualize-plan
      if_no_findings: null

  visualize-plan:
    description: "Convert plan JSON to readable markdown or HTML"
    inputs: [OUTDIR]
    command: |
      mkdir -p $OUTDIR/planner && \
      python3 .claude/skills/planner/scripts/plan_visualizer.py \
        --plan ${PLAN:-$OUTDIR/planner/plan.json} \
        --output ${PLAN_MARKDOWN:-$OUTDIR/planner/plan.md} \
        --format ${FORMAT:-markdown}
    outputs:
      - $OUTDIR/planner/plan.md
    evidence_dir: null
    detection_signals:
      - "output file populated with formatted plan content"
    false_positives:
      - "markdown library missing for HTML output, falls back to pre-wrapped HTML"
    next:
      if_findings: validate-plan
      if_no_findings: validate-plan

  validate-plan:
    description: "Validate plan JSON against plan_schema.yaml"
    inputs: [OUTDIR]
    command: |
      python3 .claude/skills/planner/scripts/plan_validator.py \
        --plan ${PLAN:-$OUTDIR/planner/plan.json} \
        --schema ${SCHEMA:-.claude/skills/planner/plan_schema.yaml}
    outputs: []
    evidence_dir: null
    detection_signals:
      - "validator exits 0 with PASSED message"
      - "no structural or consistency errors detected"
    false_positives:
      - "schema file missing throws error but does not indicate plan problem"
    next:
      if_findings: null
      if_no_findings: null

  validate-playbook:
    description: "Validate all playbook YAML files against playbook_schema.yaml"
    inputs: [OUTDIR]
    command: |
      python3 .claude/skills/planner/scripts/playbook_validator.py --all
    outputs: []
    evidence_dir: null
    detection_signals:
      - "all playbooks validate against schema with PASS status"
      - "no cycle, missing-ref, or safety-mismatch errors"
    false_positives:
      - "skill registry empty warns about missing skills but playbook may be valid"
    next:
      if_findings: null
      if_no_findings: null

  validate-playbook-dag:
    description: "Validate a playbook for DAG issues (cycles, safety, tools)"
    inputs: [OUTDIR]
    command: |
      python3 .claude/skills/planner/scripts/plan_validator.py \
        --validate-playbook-dag ${PLAYBOOK_FILE}
    outputs: []
    evidence_dir: null
    detection_signals:
      - "no DAG cycles, safety tier monotonicity holds, tools available"
    false_positives: []
    next:
      if_findings: null
      if_no_findings: null

  run-playbook:
    description: "Execute a playbook (safe execution — requires --auto-safe for auto-run)"
    inputs: [OUTDIR]
    command: |
      python3 .claude/skills/planner/scripts/playbook_runner.py \
        ${PLAYBOOK_FILE:-playbooks/new-target-passive.yaml} \
        --auto-safe
    outputs: []
    evidence_dir: null
    detection_signals:
      - "playbook phases executed in order with resume_policy and safety checks"
    false_positives:
      - "empty or missing context may cause step failures unrelated to playbook"
    next:
      if_findings: null
      if_no_findings: null

  list-playbooks:
    description: "List available playbooks"
    inputs: []
    command: |
      ls .claude/skills/planner/playbooks/*.yaml
    outputs: []
    evidence_dir: null
    detection_signals:
      - "playbook YAML files found in playbooks/ directory"
    false_positives:
      - "empty directory returns error from ls"
    next:
      if_findings: null
      if_no_findings: null

evidence_templates: {}
