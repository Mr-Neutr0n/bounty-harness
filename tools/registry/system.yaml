registry:
  category: system
  source: local package managers and system PATH
  tools:
    - name: bash
      repo: gnu.org/software/bash
      install_method: system
      binary: bash
      version_cmd: "bash --version"
      health_cmd: "bash --version"
      capabilities: [shell]
      risk_tier: passive
      output_support: [stdout, files]
      skills: [skill-scientist]

