registry:
  category: projectdiscovery
  source: https://github.com/projectdiscovery
  tools:
    - name: pdtm
      repo: github.com/projectdiscovery/pdtm/cmd/pdtm
      install_method: go
      binary: pdtm
      version_cmd: "pdtm -version"
      health_cmd: "pdtm -version"
      capabilities:
        - tool_manager
        - installer
      risk_tier: passive
      output_support:
        - stdout
        - json
      skills:
        - recon

