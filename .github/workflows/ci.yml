name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: make test
        run: make test

      - name: make validate
        run: make validate

      - name: Release gate audit
        run: python3 tools/validate_skills.py audit-release

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check no private dirs tracked
        run: |
          tracked_private="$(git ls-files .bb output evidence engagements artifacts captures reports runs scans cookies sessions secrets || true)"
          test -z "$tracked_private" || (echo "Private runtime files are tracked:" && echo "$tracked_private" && exit 1)
          echo "private runtime paths ok"

      - name: Check no vendored nuclei templates
        run: |
          tracked_templates="$(git ls-files templates/nuclei-templates || true)"
          test -z "$tracked_templates" || (echo "Vendored nuclei templates are tracked:" && echo "$tracked_templates" && exit 1)
          echo "nuclei-templates ok"
